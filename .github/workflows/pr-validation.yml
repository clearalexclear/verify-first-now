name: PR validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - backend-investigation-foundation

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Build development
        run: npm run build:dev

      - name: Lint
        run: npm run lint
